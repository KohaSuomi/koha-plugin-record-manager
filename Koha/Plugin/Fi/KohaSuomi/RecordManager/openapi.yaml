"/records/orphans":
  get:
    x-mojo-to: "Fi::KohaSuomi::RecordManager::Controllers::RecordController#list_orphans"
    operationId: listOrphanRecords
    tags:
      - records
    summary: List orphan records
    description: Retrieve orphan bibliographic records (component parts whose host records don't exist)
    parameters:
      - name: page
        in: query
        description: Page number for pagination
        required: false
        type: integer
        minimum: 1
        default: 1
      - name: per_page
        in: query
        description: Number of items per page
        required: false
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    produces:
      - application/json
    responses:
      "200":
        description: A list of orphan records
        schema:
          type: object
          properties:
            orphans:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: Component record identifier
                  control_number:
                    type: string
                    description: Control number of the component record
                  control_number_identifier:
                    type: string
                    description: Control number identifier (e.g., FI-MELINDA, FI-BTJ, FI-TATI)
                  title:
                    type: string
                    description: Component part title
                  author:
                    type: string
                    description: Component part author
                  host_item:
                    type: string
                    description: Host item information from MARC 773 field (contains author, title, etc.)
                  773w:
                    type: string
                    description: MARC 773$w field value (control number reference)
            pagination:
              type: object
              properties:
                page:
                  type: integer
                  description: Current page number
                per_page:
                  type: integer
                  description: Items per page
                total:
                  type: integer
                  description: Total number of orphan records found
                total_pages:
                  type: integer
                  description: Total number of pages
      "500":
        description: Internal server error
        schema:
          type: object
          properties:
            error:
              type: string
              description: Error message
    x-koha-authorization:
      permissions:
        catalogue: "1"

"/records/orphans/{biblionumber}/possible-hosts":
  get:
    x-mojo-to: "Fi::KohaSuomi::RecordManager::Controllers::RecordController#find_possible_hosts"
    operationId: findPossibleHosts
    tags:
      - records
    summary: Find possible host records for a component part
    description: |
      Search for possible host records for a component part using the host-item (773) field data.
      This searches by title, author, ISBN, and ISSN from the 773 field to find matching host records.
    parameters:
      - name: biblionumber
        in: path
        description: The biblionumber of the component part record
        required: true
        type: integer
    produces:
      - application/json
    responses:
      "200":
        description: List of possible host records found
        schema:
          type: object
          properties:
            biblionumber:
              type: integer
              description: The biblionumber of the component part
            possible_hosts:
              type: array
              items:
                type: object
                properties:
                  biblionumber:
                    type: string
                    description: Host record biblionumber
                  score:
                    type: number
                    description: Relevance score from Elasticsearch
                  title:
                    type: string
                    description: Host record title
                  author:
                    type: string
                    description: Host record author
                  control_number:
                    type: string
                    description: Host record control number
                  isbn:
                    type: string
                    description: Host record ISBN
                  issn:
                    type: string
                    description: Host record ISSN
            total:
              type: integer
              description: Total number of possible hosts found
            component_data:
              type: object
              description: Data extracted from component part's 773 field used for searching
              properties:
                title:
                  type: string
                  description: Title from 773$t
                author:
                  type: string
                  description: Author from 773$a
                isbn:
                  type: string
                  description: ISBN from 773$z
                issn:
                  type: string
                  description: ISSN from 773$x
      "400":
        description: Bad request - biblionumber is required
        schema:
          type: object
          properties:
            error:
              type: string
              description: Error message
      "404":
        description: Record not found or no 773 field present
        schema:
          type: object
          properties:
            error:
              type: string
              description: Error message
      "500":
        description: Internal server error
        schema:
          type: object
          properties:
            error:
              type: string
              description: Error message
    x-koha-authorization:
      permissions:
        catalogue: "1"

"/records/orphans/combine":
  post:
    x-mojo-to: "Fi::KohaSuomi::RecordManager::Controllers::RecordController#combine_orphan_to_host"
    operationId: combineOrphanToHost
    tags:
      - records
    summary: Combine an orphan record to a host record
    description: |
      Update an orphan (component part) record's 773$w field with the control number 
      of a host record, effectively linking them together.
    parameters:
      - name: body
        in: body
        description: Orphan and host biblionumbers
        required: true
        schema:
          type: object
          required:
            - orphan_biblionumber
            - host_biblionumber
          properties:
            orphan_biblionumber:
              type: integer
              description: The biblionumber of the orphan (component part) record
            host_biblionumber:
              type: integer
              description: The biblionumber of the host record
    produces:
      - application/json
    responses:
      "200":
        description: Successfully combined orphan to host
        schema:
          type: object
          properties:
            message:
              type: string
              description: Success message
      "400":
        description: Bad request - validation error or operation failed
        schema:
          type: object
          properties:
            error:
              type: string
              description: Error message explaining why the operation failed
      "500":
        description: Internal server error
        schema:
          type: object
          properties:
            error:
              type: string
              description: Error message
    x-koha-authorization:
      permissions:
        editcatalogue: "edit_catalogue"

