"/records/orphans":
  get:
    x-mojo-to: "Fi::KohaSuomi::RecordManager::Controllers::RecordController#list_orphans"
    operationId: listOrphanRecords
    tags:
      - records
    summary: List orphan records
    description: Retrieve orphan bibliographic records (component parts whose host records don't exist)
    parameters:
      - name: page
        in: query
        description: Page number for pagination
        required: false
        type: integer
        minimum: 1
        default: 1
      - name: per_page
        in: query
        description: Number of items per page
        required: false
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    produces:
      - application/json
    responses:
      "200":
        description: A list of orphan records
        schema:
          type: object
          properties:
            orphans:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: Component record identifier
                  control_number:
                    type: string
                    description: Host record control number
                  cni_control_number:
                    type: string
                    description: CNI control number (e.g., FI-MELINDA)123456
                  title:
                    type: string
                    description: Component part title
                  host-item:
                    type: string
                    description: Host item information
                  record-control-number-773w:
                    type: string
                    description: MARC 773$w field value
            pagination:
              type: object
              properties:
                page:
                  type: integer
                  description: Current page number
                per_page:
                  type: integer
                  description: Items per page
                total:
                  type: integer
                  description: Total number of orphan records found
                total_pages:
                  type: integer
                  description: Total number of pages
      "500":
        description: Internal server error
        schema:
          type: object
          properties:
            error:
              type: string
              description: Error message
    x-koha-authorization:
      permissions:
        catalogue: "1"
